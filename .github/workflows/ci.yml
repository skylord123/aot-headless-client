name: CI

# Runs on every push and on pull requests. Pull requests (including from forks)
# run with the default read-only GITHUB_TOKEN and NO access to repository
# secrets, and this workflow needs neither — so a PR cannot use it to do
# anything privileged. It only ever runs tests and validates the Docker build.
on:
  push:
  pull_request:

# Least privilege: read the code, nothing else. (No packages:write here — that
# lives only in the publish workflow, which never runs for pull requests.)
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (with dev deps)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  docker-build:
    name: Docker build (no publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Validate that the image builds on every push/PR. push:false means no
      # registry login or credentials are involved, so this is safe for forks.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
