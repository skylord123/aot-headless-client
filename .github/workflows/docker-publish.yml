name: Build & Publish Docker image

# SECURITY: this workflow can write packages, so it must never run with
# attacker-controlled code. It is triggered ONLY by `push` (to the default
# branch or a version tag) — and pushing to those refs requires write access to
# the repository. It deliberately does NOT use `pull_request` or
# `pull_request_target`, so a fork's pull request can never trigger it or reach
# the GITHUB_TOKEN's packages:write permission or any repository secret.
on:
  push:
    branches: [master]
    tags: ["v*"]

# Least privilege: read the code, write packages (GHCR). Nothing else.
permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU lets the amd64 runner build the arm64 image too.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io/<owner>/<repo>, lowercased by the action.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
